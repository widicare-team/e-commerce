<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Widi Care — Dashboard Analytics</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0d0d0d;--s1:#161616;--s2:#1e1e1e;--bd:rgba(255,255,255,.07);
  --tx:#f0ede8;--mu:#888;--mu2:#aaa;
  --ac:#c8f060;--a2:#f0c060;--a3:#60c8f0;--a4:#c060f0;--da:#f06060;--su:#60f0a8
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px}
.hd{padding:12px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;background:rgba(13,13,13,.97);gap:12px}
.hd-l{display:flex;align-items:center;gap:10px}
.dot{width:22px;height:22px;background:var(--ac);border-radius:50%;flex-shrink:0}
.hn{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.hs{font-size:10px;color:var(--mu)}
.hr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hpill{font-size:11px;padding:3px 10px;border-radius:100px}
.hp{color:var(--ac);background:rgba(200,240,96,.1)}
.hu{color:var(--mu2);background:var(--s2);border:1px solid var(--bd)}
.hload{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mu)}
.hspinner{width:10px;height:10px;border:2px solid rgba(200,240,96,.2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* filter bar */
.df{background:var(--s1);border-bottom:1px solid var(--bd);padding:8px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dfl{font-size:11px;color:var(--mu2);white-space:nowrap}
.dfbs{display:flex;gap:3px;flex-wrap:wrap}
.dfb{font-size:11px;padding:4px 12px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--mu2);cursor:pointer;transition:all .12s}
.dfb:hover{color:var(--tx);border-color:rgba(255,255,255,.25)}
.dfb.on{background:var(--ac);color:#0d0d0d;border-color:var(--ac);font-weight:600}
.dfsep{width:1px;height:20px;background:var(--bd);flex-shrink:0;margin:0 2px}
/* date inputs — visíveis */
.dfd{font-size:11px;padding:5px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.22);background:#222;color:var(--tx);cursor:pointer;min-width:120px;height:28px}
.dfd:focus{outline:none;border-color:var(--ac)}
.dfd::-webkit-calendar-picker-indicator{filter:invert(.8) sepia(1) saturate(3) hue-rotate(50deg);cursor:pointer;padding:0;margin-left:2px;opacity:.9}
.dfa{font-size:11px;padding:0 12px;border-radius:6px;border:none;background:var(--ac);color:#0d0d0d;cursor:pointer;font-weight:600;height:28px}
.dfa:hover{background:#d4f568}
.dfi{font-size:11px;color:var(--ac);white-space:nowrap}
/* botao comparar */
.dfb-cmp{font-size:11px;padding:0 12px;border-radius:100px;border:1px solid rgba(96,200,240,.35);background:transparent;color:var(--a3);cursor:pointer;transition:all .12s;height:28px}
.dfb-cmp:hover{background:rgba(96,200,240,.1)}
.dfb-cmp.on{background:var(--a3);color:#0d0d0d;font-weight:600;border-color:var(--a3)}
/* barra comparativo */
.cmp-bar{display:none;background:rgba(96,200,240,.05);border-top:1px solid rgba(96,200,240,.12);padding:6px 28px;align-items:center;gap:8px;flex-wrap:wrap}
.cmp-bar.on{display:flex}
.cmp-lbl{font-size:11px;color:var(--a3);white-space:nowrap;font-weight:500}
.cmp-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:100px;font-weight:600;margin-left:4px}
.cb-a{background:rgba(200,240,96,.15);color:var(--ac)}
.cb-b{background:rgba(96,200,240,.15);color:var(--a3)}
/* tabs */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);overflow-x:auto;padding:0 28px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:12px;padding:11px 14px;background:none;border:none;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s}
.tab:hover{color:var(--tx)}.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:500}
.bdy{padding:16px 28px}
.tp{display:none}.tp.on{display:block}
.g{display:grid;gap:8px;margin-bottom:12px}
.g6{grid-template-columns:repeat(6,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
.row{display:grid;gap:10px;margin-bottom:10px}
.r2{grid-template-columns:1fr 1fr}.r64{grid-template-columns:1.5fr 1fr}
/* metric cards */
.mc{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px 12px 10px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.cg::before{background:var(--ac)}.cb::before{background:var(--a3)}.cy::before{background:var(--a2)}.ct::before{background:var(--su)}.cr::before{background:var(--da)}.cp::before{background:var(--a4)}
.ml{font-size:9px;color:var(--mu2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.mv{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;line-height:1;letter-spacing:-.5px}
.ms{font-size:10px;color:var(--mu2);margin-top:3px}
.mdelta{font-size:10px;margin-top:5px;font-weight:600}
.mdelta.up{color:var(--su)}.mdelta.dn{color:var(--da)}.mdelta.eq{color:var(--mu2)}
.tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:100px;margin-top:4px;font-weight:600}
.tg{background:rgba(200,240,96,.1);color:var(--ac)}.ts{background:rgba(96,200,240,.1);color:var(--a3)}
/* chart cards */
.cc{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px}
.cc:last-child{margin-bottom:0}
.cct{font-size:12px;font-weight:600;margin-bottom:2px}.ccs{font-size:10px;color:var(--mu2);margin-bottom:12px}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mu2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sl::after{content:'';flex:1;height:1px;background:var(--bd)}
/* table */
.dt{width:100%;border-collapse:collapse;font-size:11px}
.dt th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--mu2);padding:0 8px 8px 0;border-bottom:1px solid var(--bd);font-weight:500}
.dt td{padding:7px 8px 7px 0;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.ib{background:rgba(200,240,96,.04);border:1px solid rgba(200,240,96,.12);border-radius:6px;padding:10px 14px;font-size:11px;color:var(--mu2);line-height:1.7;margin-bottom:10px}
.ib strong{color:var(--ac)}
.cd{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:6px;flex-shrink:0;vertical-align:middle}
.tip{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.1);color:var(--mu2);font-size:9px;font-weight:700;cursor:help;border:1px solid rgba(255,255,255,.15);flex-shrink:0;margin-left:4px;vertical-align:middle}
.tip:hover{background:rgba(200,240,96,.2);color:var(--ac)}
.tipbox{display:none;position:fixed;z-index:9999;background:#1a1a1a;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 13px;width:240px;font-size:11px;color:#ccc;line-height:1.65;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.tipbox b{color:var(--ac);display:block;font-size:12px;margin-bottom:4px}
.tipbox em{color:var(--mu2);font-style:normal;font-size:10px}
/* SC filter */

@media(max-width:900px){.g6,.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.r2,.r64{grid-template-columns:1fr}.hd,.bdy,.tabs,.df,.cmp-bar{padding-left:14px;padding-right:14px}}
.funil-wrap{display:flex;gap:0;margin-bottom:10px}
.funil-step{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:0;padding:16px 14px;position:relative;text-align:center}
.funil-step:first-child{border-radius:8px 0 0 8px}.funil-step:last-child{border-radius:0 8px 8px 0}
.funil-step::after{content:"▶";position:absolute;right:-10px;top:50%;transform:translateY(-50%);color:var(--bd);font-size:14px;z-index:1}
.funil-step:last-child::after{display:none}
.funil-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--mu2);margin-bottom:6px}
.funil-val{font-size:22px;font-weight:700;font-family:"Syne",sans-serif;margin-bottom:4px}
.funil-pct{font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px;display:inline-block}
.pct-ok{background:rgba(96,240,168,.15);color:var(--su)}.pct-warn{background:rgba(240,192,96,.15);color:var(--a2)}.pct-bad{background:rgba(240,96,96,.15);color:var(--da)}
.prod-search{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.prod-search input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:7px 12px;color:var(--tx);font-size:12px;font-family:"DM Sans",sans-serif}
.prod-search input:focus{outline:none;border-color:var(--ac)}
.prod-search input::placeholder{color:var(--mu)}
.sort-btn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mu2);cursor:pointer;white-space:nowrap}
.sort-btn.on{background:var(--ac);color:#0d0d0d;border-color:var(--ac);font-weight:600}
.banner-card{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:16px;margin-bottom:8px}
.banner-rank{font-size:18px;font-weight:700;font-family:"Syne",sans-serif;color:var(--mu);min-width:28px;text-align:center}
.banner-rank.top{color:var(--ac)}
.banner-info{flex:1;min-width:0}
.banner-name{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.banner-stats{display:flex;gap:16px;flex-wrap:wrap}
.banner-stat{font-size:11px;color:var(--mu2)}
.banner-stat strong{color:var(--tx);font-weight:600}
.banner-bar-wrap{width:120px;height:6px;background:var(--s2);border-radius:3px;flex-shrink:0}
.banner-bar{height:6px;border-radius:3px;background:var(--ac)}
.banner-ctr{font-size:13px;font-weight:700;min-width:52px;text-align:right;flex-shrink:0}
.cfg-box{background:rgba(240,192,96,.06);border:1px solid rgba(240,192,96,.25);border-radius:8px;padding:12px 16px;font-size:11px;color:var(--a2);margin-bottom:14px;line-height:1.8}
.cfg-box code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-size:10px;color:var(--a3)}

</style>
</head>

<script>
var SHEET_ID='1qWSZxUytsZYbX3jDaIEDrn37Iu7aN0h2qxvmlfpFfkw';

var DB={canal:[],email:[],social:[],brasil:[],sc:[],sc_daily:[],paises:[],paises_raw:[],sct:[],sc_termos:[],sc_raw:[],lastGA4:null,lastSC:null,produtos:[],produtos_by_date:[],produtos_daily:[],banners:[],banners_by_date:[],banners_by_type:{},banners_by_type_date:{},ecommerce:[],banners_utm:[],banners_utm_by_medium:{},banners_utm_by_campaign:[],campanha:[],campanha_raw:[],campanha_mediums:['all']};
var SC_PG_FILTER=[],F='',T='',FC='',TC='',CMP_ON=false,BN_TYPE_FILTER='all';
var CH={},LOADED=0,TOTAL=6;

var TIPS={
  receita:'<b>Receita total</b>Soma de todas as compras finalizadas rastreadas pelo GA4.<em>Fonte: GA4 Magic Reports · purchaseRevenue</em>',
  ke:'<b>Key Events</b>Conversões no GA4 — principalmente compras concluídas.<em>Fonte: GA4 Magic Reports · keyEvents</em>',
  sessoes:'<b>Sessões</b>Cada visita ao site. Expira após 30min de inatividade.<em>Fonte: GA4 Magic Reports · sessions</em>',

  posicao:'<b>Posição Média</b>Ranking no Google. <strong style="color:#f0c060">Menor = melhor.</strong><em>Fonte: Search Analytics for Sheets</em>',

var tipbox=document.getElementById('tipbox');
document.addEventListener('mouseover',function(e){var el=e.target.closest('.tip');if(!el)return;var k=el.dataset.tip;if(!TIPS[k])return;tipbox.innerHTML=TIPS[k];tipbox.style.display='block';});
document.addEventListener('mousemove',function(e){if(tipbox.style.display!=='block')return;var x=e.clientX+14,y=e.clientY-10;if(x+250>window.innerWidth)x=e.clientX-258;if(y+160>window.innerHeight)y=e.clientY-160;tipbox.style.left=x+'px';tipbox.style.top=y+'px';});
document.addEventListener('mouseout',function(e){if(e.target.closest('.tip'))tipbox.style.display='none';});
function tip(k){return'<span class="tip" data-tip="'+k+'">?</span>';}

function parseCSV(text){var lines=text.trim().split('\n');if(lines.length<2)return{headers:[],rows:[]};var headers=parseCSVLine(lines[0]),rows=[];for(var i=1;i<lines.length;i++){var vals=parseCSVLine(lines[i]);if(!vals.length)continue;var obj={};for(var j=0;j<headers.length;j++)obj[headers[j]]=vals[j]||'';rows.push(obj);}return{headers:headers,rows:rows};}
function parseCSVLine(line){var result=[],cur='',inQ=false;for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){inQ=!inQ;continue;}if(c===','&&!inQ){result.push(cur.trim());cur='';continue;}cur+=c;}result.push(cur.trim());return result;}

function transBannersUTM(p){
  var h=p.headers,rows=p.rows;if(!rows.length)return[];
  var dC=findCol(h,['date','Date','Day']),
      mC=findCol(h,['sessionMedium','session_medium','Session medium','medium']),
      campC=findCol(h,['sessionCampaignName','session_campaign_name','Session campaign name','campaign','Campaign']),
      sC=findCol(h,['sessions','Sessions']),
      esC=findCol(h,['engagedSessions','engaged_sessions','Engaged sessions']),
      rC=findCol(h,['purchaseRevenue','purchaserevenue','Purchase revenue']);
  if(!dC){console.warn('banners_utm: sem date',h);return[];}

  var BANNER_MEDIUMS=['banner_home','banner_middle','banner_bottom','banner'];
  var byMedium={},byCampaign={},byDate={};
  var byCampAll={};

  rows.forEach(function(r){
    var d=String(r[dC]||'').trim().replace(/T.*/,'').replace(/ .*/,'').substring(0,10);
    if(!d||!/^\d{4}-\d{2}-\d{2}/.test(d))return;
    var medium=(r[mC]||'').trim();
    var campaign=(r[campC]||'').trim()||'(not set)';
    var s=nv(r[sC]),es=nv(r[esC]),rev=nv(r[rC]);

    var k=campaign;
    if(!byCampAll[k])byCampAll[k]={campaign:k,mediums:{},s:0,es:0,r:0,byDate:{}};
    byCampAll[k].s+=s;byCampAll[k].es+=es;byCampAll[k].r+=rev;
    if(!byCampAll[k].mediums[medium])byCampAll[k].mediums[medium]=0;
    byCampAll[k].mediums[medium]+=s;
    if(!byCampAll[k].byDate[d])byCampAll[k].byDate[d]={s:0,es:0,r:0};
    byCampAll[k].byDate[d].s+=s;byCampAll[k].byDate[d].es+=es;byCampAll[k].byDate[d].r+=rev;

    var isBanner=BANNER_MEDIUMS.indexOf(medium)>=0;
    if(!isBanner)return;

    if(!byMedium[medium])byMedium[medium]={medium:medium,s:0,es:0,r:0,byDate:{}};
    byMedium[medium].s+=s;byMedium[medium].es+=es;byMedium[medium].r+=rev;
    if(!byMedium[medium].byDate[d])byMedium[medium].byDate[d]={s:0,es:0,r:0};
    byMedium[medium].byDate[d].s+=s;byMedium[medium].byDate[d].es+=es;byMedium[medium].byDate[d].r+=rev;

    var campKey=medium+'|'+campaign;
    if(!byCampaign[campKey])byCampaign[campKey]={medium:medium,campaign:campaign,s:0,es:0,r:0};
    byCampaign[campKey].s+=s;byCampaign[campKey].es+=es;byCampaign[campKey].r+=rev;

    if(!byDate[d])byDate[d]={s:0,es:0,r:0};
    byDate[d].s+=s;byDate[d].es+=es;byDate[d].r+=rev;
  });

  DB.banners_utm_by_medium=byMedium;
  DB.banners_utm_by_campaign=Object.values(byCampaign).sort(function(a,b){return b.r-a.r||b.s-a.s;});

  var SKIP=['(not set)','(organic)','(referral)','(direct)',''];
  DB.campanha=Object.values(byCampAll)
    .filter(function(c){return c.campaign&&SKIP.indexOf(c.campaign)<0;})
    .sort(function(a,b){return b.r-a.r||b.s-a.s;}).slice(0,150);

  var allMediums={};
  Object.values(byCampAll).forEach(function(c){
    Object.keys(c.mediums).forEach(function(m){
      if(m&&m.length<=20&&m!=='(none)'&&m!=='(not set)'&&m!=='(not provided)'&&m!=='(data not available)')allMediums[m]=1;
    });
  });
  DB.campanha_mediums=['all'].concat(Object.keys(allMediums).sort(function(a,b){
    var aB=a.indexOf('banner')>=0?0:1, bB=b.indexOf('banner')>=0?0:1;
    return aB-bB||a.localeCompare(b);
  }));
  DB.campanha_raw=[];
  var BANNER_MEDS=['banner_home','banner_middle','banner_bottom','banner'];
  var SKIP_CAMP=['(not set)','(organic)','(referral)','(direct)',''];
  rows.forEach(function(r){
    var d=String(r[dC]||'').trim().replace(/T.*/,'').replace(/ .*/,'').substring(0,10);
    if(!d||!/^\d{4}-\d{2}-\d{2}/.test(d))return;
    var medium=(r[mC]||'').trim();
    var campaign=(r[campC]||'').trim()||'(not set)';
    var s=nv(r[sC]),es=nv(r[esC]),rev=nv(r[rC]);
    var isBanner=BANNER_MEDS.indexOf(medium)>=0;
    if(!isBanner&&SKIP_CAMP.indexOf(campaign)>=0)return;
    DB.campanha_raw.push({d:d,medium:medium,campaign:campaign,s:s,es:es,r:rev});
  });

  return Object.keys(byDate).sort().map(function(d){
    var x=byDate[d];return{d:d,s:x.s,es:x.es,r:x.r};
  });
}

function _getBannerFiltered(){
  var type=BN_TYPE_FILTER;
  var allBanners=type==='all'?DB.banners:DB.banners.filter(function(b){return b.creative===type;});
  var banners=allBanners.map(function(b){
    var bd=b.byDate||{};
    var v=0,c=0;
    Object.keys(bd).forEach(function(d){if(d>=F&&d<=T){v+=bd[d].v||0;c+=bd[d].c||0;}});
    if(v===0&&c===0){v=b.v;c=b.c;}
    return{nome:b.nome,v:v,c:c,creative:b.creative,byDate:bd};
  }).filter(function(b){return b.v>0||b.c>0;})
    .sort(function(a,b){return b.v-a.v;});
  var byDate=type==='all'?(DB.banners_by_date||[]):(DB.banners_by_type_date&&DB.banners_by_type_date[type]?DB.banners_by_type_date[type]:[]);
  var bdFilt=byDate.filter(function(r){return r.d>=F&&r.d<=T;});
  if(!bdFilt.length&&byDate.length)bdFilt=byDate;
  return{banners:banners,bdFilt:bdFilt};
}

  var res=_getBannerFiltered();

var CP_MEDIUM_FILTER='all',CP_CAMP_SEARCH='',CP_SORT='r';

function setCPMedium(m,btn){
  CP_MEDIUM_FILTER=m;
  [].forEach.call(document.querySelectorAll('.cp-med-btn'),function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  _renderCampTable();

function setCPSort(s,btn){
  CP_SORT=s;
  [].forEach.call(document.querySelectorAll('.cp-sort-btn'),function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  _renderCampTable();
}

function _renderCampTable(){
  var raw=DB.campanha_raw||[];
  var search=(document.getElementById('cp-search')||{value:''}).value.toLowerCase();
  var periodRaw=raw.filter(function(r){return r.d>=F&&r.d<=T;});
  if(!periodRaw.length)periodRaw=raw;
  var byCamp={};
  periodRaw.forEach(function(r){
    if(CP_MEDIUM_FILTER!=='all'&&r.medium!==CP_MEDIUM_FILTER)return;
    var k=r.campaign;
    if(!byCamp[k])byCamp[k]={campaign:k,mediums:{},s:0,es:0,r:0};
    byCamp[k].s+=r.s;byCamp[k].es+=r.es;byCamp[k].r+=r.r;
    if(!byCamp[k].mediums[r.medium])byCamp[k].mediums[r.medium]=0;
    byCamp[k].mediums[r.medium]+=r.s;
  });
  var camps=Object.values(byCamp);
  if(search)camps=camps.filter(function(c){return c.campaign.toLowerCase().indexOf(search)>=0;});
  camps=camps.sort(function(a,b){return CP_SORT==='s'?b.s-a.s:CP_SORT==='es'?b.es-a.es:b.r-a.r;});
  var totS=camps.reduce(function(t,c){return t+c.s;},0);
  var totES=camps.reduce(function(t,c){return t+c.es;},0);
  var totR=camps.reduce(function(t,c){return t+c.r;},0);
  var engPct=totS>0?(totES/totS*100).toFixed(1):0;
  var cards=document.getElementById('cp-cards');
  if(cards)cards.innerHTML=
    '<div class="mc cg"><div class="ml">Sessões</div><div class="mv">'+fmt(totS)+'</div><span class="tag ts">'+fmtD(F)+' – '+fmtD(T)+'</span></div>'+
    '<div class="mc ct"><div class="ml">Sessões engajadas</div><div class="mv">'+fmt(totES)+'</div><div class="ms">'+engPct+'% engajamento</div></div>'+
    '<div class="mc cp"><div class="ml">Receita</div><div class="mv" style="color:var(--a4)">'+fmtR(totR)+'</div><span class="tag ts">filtro ativo</span></div>';
  var cnt=document.getElementById('cp-count');
  if(cnt)cnt.textContent=camps.length+' campanhas';
  var tb=document.getElementById('cp-tb');if(!tb)return;
  tb.innerHTML=camps.slice(0,50).map(function(c){
    var er=c.s>0?Math.round(c.es/c.s*10000)/100:0;
    var rps=c.s>0?c.r/c.s:0;
    var topMediums=Object.keys(c.mediums).sort(function(a,b){return c.mediums[b]-c.mediums[a];}).slice(0,3).join(', ');
    var isBanner=['banner_home','banner_middle','banner_bottom'].some(function(m){return c.mediums[m];});
    return '<tr'+(isBanner?' style="background:rgba(200,240,96,.03)"':'')+'>'+
      '<td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.campaign+'">'+
        (isBanner?'<span style="color:var(--ac);margin-right:4px" title="Banner">🖼</span>':'')+c.campaign+
      '</td>'+
      '<td style="color:var(--mu2);font-size:10px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+topMediums+'</td>'+
      '<td>'+fmt(c.s)+'</td>'+
      '<td>'+fmt(c.es)+'</td>'+
      '<td style="color:'+(er>=60?'#60f0a8':er>=40?'#f0c060':'#f06060')+'">'+er.toFixed(0)+'%</td>'+
      '<td style="color:var(--ac);font-weight:600">'+fmtR(c.r)+'</td>'+
      '<td style="color:var(--mu2)">'+fmtR(rps)+'</td>'+
    '</tr>';
  }).join('');
}

function renderAbaCampanhas(){
  var cp=document.getElementById('cp-c');if(!cp)return;
  var camps=DB.campanha||[];
  var utmRows=DB.banners_utm||[];
  var utmFilt=utmRows.filter(function(r){return r.d>=F&&r.d<=T;});
  if(!utmFilt.length&&utmRows.length)utmFilt=utmRows;
  var hasBannerData=utmFilt.some(function(r){return r.s>0||r.r>0;})&&utmFilt.length>0;
  var utmFiltB=CMP_ON&&FC&&TC?utmRows.filter(function(r){return r.d>=FC&&r.d<=TC;}):[];
  var mediums=DB.campanha_mediums||['all'];
  var medBtns=mediums.map(function(m){
    var label=m==='all'?'Todos':m;
    return '<button class="cp-med-btn dfb'+(CP_MEDIUM_FILTER===m?' on':'')+'" onclick="setCPMedium(\''+m+'\',this)">'+label+'</button>';
  }).join('');

  cp.innerHTML=
    '<div class="sl">campanhas — GA4 · sessionMedium × sessionCampaignName · aba banners_utm</div>'+
    (!camps.length?'<div class="cfg-box">⚙️ Configure a aba <strong>banners_utm</strong> no GA4 Magic Reports com dimensões <code>date, sessionMedium, sessionCampaignName</code> e métricas <code>sessions, engagedSessions, purchaseRevenue</code></div>':'')+
    (hasBannerData?
      '<div class="row r2" style="margin-bottom:10px">'+
        '<div class="cc"><div class="cct">Sessões diárias — banners</div><div class="ccs">utm_medium: banner_home · banner_middle · banner_bottom</div><div style="height:180px"><canvas id="c_cpS"></canvas></div></div>'+
        '<div class="cc"><div class="cct">Receita diária — banners</div><div class="ccs">purchaseRevenue via UTM de banner</div><div style="height:180px"><canvas id="c_cpR"></canvas></div></div>'+
      '</div>':'')+
    '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">'+
      '<span class="dfl">Medium:</span>'+
      '<div style="display:flex;gap:4px;flex-wrap:wrap">'+medBtns+'</div>'+
      '<div style="flex:1;min-width:180px"><input id="cp-search" type="text" placeholder="🔍 Buscar campanha..." style="width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:5px 10px;color:var(--tx);font-size:11px" oninput="_renderCampTable()"></div>'+
      '<div style="display:flex;gap:4px">'+
        '<button class="cp-sort-btn sort-btn'+(CP_SORT==='r'?' on':'')+'" onclick="setCPSort(\'r\',this)">Receita</button>'+
        '<button class="cp-sort-btn sort-btn'+(CP_SORT==='s'?' on':'')+'" onclick="setCPSort(\'s\',this)">Sessões</button>'+
        '<button class="cp-sort-btn sort-btn'+(CP_SORT==='es'?' on':'')+'" onclick="setCPSort(\'es\',this)">Engajadas</button>'+
      '</div>'+
    '</div>'+
    '<div class="g g3" style="margin-bottom:12px" id="cp-cards"></div>'+
    '<div class="cc">'+
      '<div class="cct">Todas as campanhas <span id="cp-count" style="font-size:10px;color:var(--mu2);font-weight:400"></span></div>'+
      '<table class="dt"><thead><tr>'+
        '<th>Campanha</th><th>Mediums</th><th>Sessões</th><th>Engajadas</th><th>Eng%</th><th>Receita</th><th>RPS</th>'+
      '</tr></thead><tbody id="cp-tb"></tbody></table>'+
    '</div>';

  _renderCampTable();

  setTimeout(function(){
    if(hasBannerData){
      var labA=utmFilt.map(function(r){return fmtD(r.d);});
      var dA_s=utmFilt.map(function(r){return r.s;});
      var dA_r=utmFilt.map(function(r){return r.r;});
      var dB_s=utmFiltB.map(function(r){return r.s;});
      var dB_r=utmFiltB.map(function(r){return r.r;});
      mkl('c_cpS',labA,dA_s,'rgba(200,240,96,.9)',dB_s.length?dB_s:null);
      mklR('c_cpR',labA,dA_r,'rgba(192,96,240,.9)',dB_r.length?dB_r:null);
    }
  },50);
}

function renderAbaBanners(){
  var hasCr=DB.banners.some(function(b){return b.creative&&b.creative!=='outros';});
  var typeButtons=hasCr?
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'+
      '<button class="bn-type-btn dfb'+(BN_TYPE_FILTER==='all'?' on':'')+ '" onclick="setBnType(\'all\',this)">Todos</button>'+
      '<button class="bn-type-btn dfb'+(BN_TYPE_FILTER==='home_banner'?' on':'')+ '" onclick="setBnType(\'home_banner\',this)" style="'+(BN_TYPE_FILTER==='home_banner'?'':'border-color:rgba(200,240,96,.4);color:#c8f060')+'">🎠 Full Banner Home</button>'+
      '<button class="bn-type-btn dfb'+(BN_TYPE_FILTER==='middle_banner'?' on':'')+ '" onclick="setBnType(\'middle_banner\',this)" style="'+(BN_TYPE_FILTER==='middle_banner'?'':'border-color:rgba(96,200,240,.4);color:#60c8f0')+'">📌 Middle Banner Home</button>'+
      '<button class="bn-type-btn dfb'+(BN_TYPE_FILTER==='banner_bottom'?' on':'')+ '" onclick="setBnType(\'banner_bottom\',this)" style="'+(BN_TYPE_FILTER==='banner_bottom'?'':'border-color:rgba(240,192,96,.4);color:#f0c060')+'">🏷 Full Banner Categoria</button>'+
    '</div>':
    (!DB.banners.length?'':'<div class="cfg-box" style="border-color:rgba(96,200,240,.3);color:var(--a3)">💡 Adicione <code>itemPromotionCreativeName</code> como dimensão no relatório de banners para filtrar por tipo.</div>');

  document.getElementById('bn-c').innerHTML=
    '<div class="sl">banners — GA4 · itemPromotionViews / itemPromotionClicks · período: '+fmtD(F)+' – '+fmtD(T)+'</div>'+
    (!DB.banners.length?'<div class="cfg-box">⚙️ <strong>Configure a aba "banners":</strong> Dimensões: <code>date, itemPromotionName, itemPromotionCreativeName</code> · Métricas: <code>itemsViewedInPromotion, itemsClickedInPromotion</code></div>':'')+
    typeButtons+
    '<div class="g g4" id="bnm" style="grid-template-columns:repeat(4,1fr)"></div>'+
    '<div id="bn-charts"></div>'+
    '<div class="cc"><div class="cct">Performance por banner</div><div class="ccs" id="bn-list-subtitle">Ordenado por impressões — período completo</div><div id="bn-list"></div></div>';

  _renderBannerContent();
}

function renderAbaEcommerce(){
  var ecFilt=DB.ecommerce.filter(function(r){return r.d>=F&&r.d<=T;});
  var totECS=ecFilt.reduce(function(t,r){return t+r.s;},0);
  var totECatc=ecFilt.reduce(function(t,r){return t+r.atc;},0);
  var totECchk=ecFilt.reduce(function(t,r){return t+r.chk;},0);
  var totECpur=ecFilt.reduce(function(t,r){return t+r.pur;},0);
  var totECrev=ecFilt.reduce(function(t,r){return t+r.r;},0);
  var rateAtcS=totECS>0?Math.round(totECatc/totECS*10000)/100:0;
  var rateChkAtc=totECatc>0?Math.round(totECchk/totECatc*10000)/100:0;
  var ratePurChk=totECchk>0?Math.round(totECpur/totECchk*10000)/100:0;
  var rateConv=totECS>0?Math.round(totECpur/totECS*10000)/100:0;
  function pctBadge(v,ok,warn){var c=v>=ok?'ok':v>=warn?'warn':'bad';return'<span class="funil-pct pct-'+c+'">'+v.toFixed(1)+'%</span>';}

  var ec=document.getElementById('ec-c');
  if(!ec)return;
  ec.innerHTML=
    '<div class="sl">funil de e-commerce — GA4 Magic Reports · dimensão: date</div>'+
    (!DB.ecommerce.length?'<div class="cfg-box">⚙️ <strong>Configure a aba "ecommerce":</strong> Dimensão: <code>date</code> · Métricas: <code>sessions, addToCarts, checkouts, ecommercePurchases, purchaseRevenue</code></div>':'')+
    '<div class="g g4" id="ecm"></div>'+
    '<div class="funil-wrap">'+
      '<div class="funil-step cb"><div class="funil-lbl">Sessões'+tip('sessoes')+'</div>'+
        '<div class="funil-val" style="color:var(--a3)">'+fmt(totECS)+'</div>'+
        '<div style="font-size:10px;color:var(--mu2);margin-top:4px">total</div></div>'+
      '<div class="funil-step ct"><div class="funil-lbl">Add-to-Cart'+tip('funil_atc')+'</div>'+
        '<div class="funil-val" style="color:var(--su)">'+fmt(totECatc)+'</div>'+
        pctBadge(rateAtcS,15,8)+'</div>'+
      '<div class="funil-step cy"><div class="funil-lbl">Checkout'+tip('funil_chk')+'</div>'+
        '<div class="funil-val" style="color:var(--a2)">'+fmt(totECchk)+'</div>'+
        pctBadge(rateChkAtc,60,40)+'</div>'+
      '<div class="funil-step cg"><div class="funil-lbl">Compras'+tip('ke')+'</div>'+
        '<div class="funil-val" style="color:var(--ac)">'+fmt(totECpur)+'</div>'+
        pctBadge(ratePurChk,50,30)+'</div>'+
    '</div>'+
    '<div class="ib" style="margin-bottom:12px">🎯 <strong>Conversão: '+rateConv.toFixed(2)+'%</strong> (sessões→compra). '+
      (rateConv>=1.5?'✅ Acima da meta (1,5%).':rateConv>=0.8?'⚠️ Abaixo do ideal.':'🔴 Crítico — verifique o checkout.')+
    '</div>'+
    '<div class="row r2">'+
      '<div class="cc"><div class="cct">Add-to-cart diário</div><div class="ccs">Filtro ativo</div><div style="height:200px"><canvas id="c_ecatc"></canvas></div></div>'+
      '<div class="cc"><div class="cct">Compras diárias</div><div class="ccs">Filtro ativo</div><div style="height:200px"><canvas id="c_ecpur"></canvas></div></div>'+
    '</div>'+
    '<div class="row r2">'+
      '<div class="cc"><div class="cct">Conversão diária (%)</div><div class="ccs">Sessões → compra</div><div style="height:200px"><canvas id="c_ecconv"></canvas></div></div>'+
      '<div class="cc"><div class="cct">ATC vs Compras</div><div class="ccs">Abandono de carrinho</div><div style="height:200px"><canvas id="c_ecfunil"></canvas></div></div>'+
    '</div>';

  var ecm=document.getElementById('ecm');
  if(ecm)ecm.innerHTML=
    '<div class="mc cg"><div class="ml">Receita</div><div class="mv">'+fmtR(totECrev)+'</div><span class="tag tg">filtro</span></div>'+
    '<div class="mc cy"><div class="ml">Conversão</div><div class="mv" style="color:'+(rateConv>=1.5?'#c8f060':rateConv>=0.8?'#f0c060':'#f06060')+'">'+rateConv.toFixed(2)+'%</div></div>'+
    '<div class="mc ct"><div class="ml">Add-to-cart</div><div class="mv">'+fmt(totECatc)+'</div></div>'+
    '<div class="mc cb"><div class="ml">Abandono carrinho</div><div class="mv" style="color:var(--da)">'+(totECatc>0?Math.round((totECatc-totECpur)/totECatc*100):0)+'%</div><div class="ms">atc sem compra</div></div>';

  setTimeout(function(){mkb('c_ecatc',ecFilt.map(function(r){return fmtD(r.d);}),ecFilt.map(function(r){return r.atc;}),'rgba(96,240,168,.7)');},50);
  setTimeout(function(){mkb('c_ecpur',ecFilt.map(function(r){return fmtD(r.d);}),ecFilt.map(function(r){return r.pur;}),'rgba(200,240,96,.8)');},100);
  setTimeout(function(){
    mk('c_ecconv','line',{labels:ecFilt.map(function(r){return fmtD(r.d);}),datasets:[{data:ecFilt.map(function(r){return r.rateConv;}),borderColor:'#c8f060',backgroundColor:'rgba(200,240,96,.07)',tension:.3,fill:true,pointRadius:0,borderWidth:2}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:XS,y:{ticks:{color:CT,font:{size:9},callback:function(v){return v.toFixed(1)+'%';}},grid:{color:CG}}}});
  },150);
  setTimeout(function(){
    mk('c_ecfunil','bar',{labels:ecFilt.map(function(r){return fmtD(r.d);}),datasets:[{label:'Add-to-cart',data:ecFilt.map(function(r){return r.atc;}),backgroundColor:'rgba(96,240,168,.5)',borderRadius:2},{label:'Compras',data:ecFilt.map(function(r){return r.pur;}),backgroundColor:'rgba(200,240,96,.85)',borderRadius:2}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:CT,boxWidth:8,font:{size:10}}}},scales:{x:XS,y:YS}});
  },200);
}

function setSCFilter(page,btn){SC_PG_FILTER=page?[page]:[];[].forEach.call(document.querySelectorAll('.sc-pb'),function(b){b.classList.remove('on');});if(btn)btn.classList.add('on');UA();}

loadAll();
</script>
